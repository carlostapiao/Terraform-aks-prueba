name: Terraform + AKS CI/CD

on:
  push:
    branches:
      - main

env:
  ACR_NAME: carlos69lamejor
  IMAGE_NAME: app
  AKS_NAME: aks-lab
  RESOURCE_GROUP: rg-k8s-lab

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.7.7

    - name: Terraform Init
      working-directory: infra
      run: terraform init

    - name: Terraform Plan
      working-directory: infra
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      working-directory: infra
      run: terraform apply -auto-approve tfplan

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Build and Push Docker image (ARM64)
      run: |
        docker buildx create --use
        docker buildx build \
          --platform linux/arm64 \
          -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
          -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
          --push .

    - name: Get AKS credentials
      run: az aks get-credentials --resource-group $RESOURCE_GROUP --name $AKS_NAME --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl set image deployment/convenio-api convenio-api=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
        kubectl apply -f kubernetes/